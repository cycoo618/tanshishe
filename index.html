<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050510">
<title>SERPENT</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Press+Start+2P&family=Luckiest+Guy&family=Exo+2:wght@400;600;700;900&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050510;
  --surface: #0a0a1f;
  --card: #0d0d26;
  --border: #1a1a3e;
  --cyan: #00f5d4;
  --magenta: #ff006e;
  --text: #c8d6ff;
  --dim: #3a4070;
  --grad1: rgba(0,245,212,0.07);
  --grad2: rgba(255,0,110,0.07);
  /* Effect variables — overridden per skin */
  --title-shadow: 0 0 16px var(--cyan), 0 0 36px rgba(0,245,212,0.2);
  --ov-glow: 0 0 20px var(--cyan);
  --score-glow: 0 0 10px var(--cyan);
  --ov-score-glow: 0 0 24px var(--magenta), 0 0 60px rgba(255,0,110,0.3);
  --btn-glow: 0 0 10px var(--cyan);
  --btn-boxshadow: 0 0 14px rgba(0,245,212,0.08), inset 0 0 14px rgba(0,245,212,0.04);
  --canvas-boxshadow: 0 0 0 1px #0d0d2a, 0 0 28px rgba(0,245,212,0.08), inset 0 0 28px rgba(0,0,0,0.6);
  --overlay-bg: rgba(5,5,16,0.92);
  --divider-bg: rgba(5,5,16,0.92);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

html { height: 100%; background: var(--bg); overscroll-behavior: none; }

body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Orbitron', monospace;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  padding: var(--sat) var(--sar) var(--sab) var(--sal);
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 15% 15%, var(--grad1) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, var(--grad2) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
  transition: background-image 0.5s;
}

/* ══ App shell ══════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 10px 12px 6px;
  gap: 0;
}

/* ── Header ── */
#headerEl {
  width: 100%; flex-shrink: 0;
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-bottom: 8px;
}
.title-block { display: flex; flex-direction: column; gap: 2px; }
.title {
  font-size: clamp(14px, 5.5vw, 22px); font-weight: 900; letter-spacing: 5px;
  color: var(--cyan);
  text-shadow: var(--title-shadow);
  line-height: 1;
}
.player-tag {
  font-size: clamp(6px, 2vw, 9px); letter-spacing: 1px; color: var(--dim);
  display: none; align-items: center; gap: 4px; cursor: pointer; margin-top: 2px;
}
.player-tag.on { display: flex; }
.player-tag .pname { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
.player-tag .sw { opacity: 0.45; }

.scores { display: flex; gap: 7px; }
.score-box {
  text-align: center; background: var(--surface);
  border: 1px solid var(--border); border-radius: 7px;
  padding: clamp(4px,1.5vw,8px) clamp(9px,3vw,14px);
  min-width: clamp(50px, 15vw, 72px);
}
.score-label { font-size: clamp(5px,1.8vw,7px); letter-spacing: 2px; color: var(--dim); margin-bottom: 2px; }
.score-value {
  font-size: clamp(14px,4.5vw,20px); font-weight: 700;
  color: var(--cyan); text-shadow: var(--score-glow);
  transition: transform 0.12s, color 0.12s, text-shadow 0.12s;
}
.score-value.pop { transform: scale(1.3); color: var(--magenta); text-shadow: 0 0 14px var(--magenta); }

/* ── Canvas zone ── */
#canvasWrap {
  flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  width: 100%;
}
.canvas-container {
  position: relative;
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  box-shadow: var(--canvas-boxshadow);
  flex-shrink: 0;
}
canvas { display: block; touch-action: none; }
.canvas-container::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px);
  pointer-events: none; border-radius: 10px;
}
.pause-badge {
  position: absolute; top: 10px; right: 11px;
  font-size: clamp(6px,2vw,9px); letter-spacing: 2px;
  color: var(--magenta); text-shadow: 0 0 10px var(--magenta);
  opacity: 0; transition: opacity 0.3s; z-index: 5;
}
.pause-badge.on { opacity: 1; }

/* ── Bottom controls (portrait) ── */
#bottomArea {
  flex-shrink: 0;
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  padding-top: 6px;
}

.speed-row {
  display: flex; align-items: center; gap: 5px;
  font-size: clamp(6px,1.8vw,8px); letter-spacing: 2px; color: var(--dim);
}
.pip-track { display: flex; gap: 3px; }
.pip {
  width: clamp(9px,2.5vw,13px); height: 3px;
  border-radius: 2px; background: var(--border);
  transition: background 0.3s, box-shadow 0.3s;
}
.pip.active { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
.pip.hot    { background: var(--magenta); box-shadow: 0 0 5px var(--magenta); }

/* ── Control mode cards (selection screen) ── */
.ctrl-cards {
  display: flex; gap: 10px; width: 100%;
}
.ctrl-card {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: clamp(16px,5vw,24px) 10px;
  cursor: pointer; transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-card:active, .ctrl-card.selected {
  border-color: var(--cyan);
  background: rgba(0,245,212,0.06);
  box-shadow: 0 0 20px rgba(0,245,212,0.12);
}
.ctrl-card-icon {
  font-size: clamp(28px,8vw,40px);
  line-height: 1;
}
.ctrl-card-name {
  font-size: clamp(9px,2.5vw,12px); font-weight: 700;
  letter-spacing: 3px; color: var(--text);
}
.ctrl-card-desc {
  font-size: clamp(6px,1.8vw,8px); letter-spacing: 1px;
  color: var(--dim); text-align: center;
}

/* ── Skin cards ── */
.skin-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  width: 100%; max-height: clamp(200px,55vmin,320px); overflow-y: auto;
}
.skin-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: clamp(5px,1.5vw,8px); cursor: pointer; transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.skin-card.selected { border-color: var(--cyan); background: rgba(0,245,212,0.07); box-shadow: 0 0 16px rgba(0,245,212,0.1); }
.skin-card:not(.locked):active { border-color: var(--cyan); background: rgba(0,245,212,0.05); }
.skin-card.locked { opacity: 0.45; cursor: default; }
.skin-thumb { width: 100%; height: auto; border-radius: 5px; display: block; }
.skin-lock { font-size: clamp(13px,3.5vw,17px); line-height: 1; }
.skin-cam-btn { font-size: clamp(12px,3vw,15px); line-height: 1; opacity: 0.75; }
.unlock-badge {
  font-size: clamp(7px,2vw,9px); letter-spacing: 2px; color: #ffd700;
  text-shadow: 0 0 12px rgba(255,215,0,0.8); border: 1px solid rgba(255,215,0,0.35);
  padding: 4px 12px; border-radius: 4px;
}

/* D-pad auto-sizes to fill available width proportionally */
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 4px;
  /* width/height set by JS */
}
.dpad-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; color: var(--cyan);
  font-size: clamp(12px,3.5vw,20px);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.08s; touch-action: manipulation;
}
.dpad-btn:active { background: rgba(0,245,212,0.14); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,245,212,0.2); transform: scale(0.86); }
.dpad-btn.center { font-size: clamp(7px,2.5vw,11px); color: var(--dim); }
.dpad-btn.empty  { background: transparent; border: none; pointer-events: none; }

/* ── Gesture zone ── */
.gesture-zone {
  display: none; /* shown in swipe mode */
  align-items: center; justify-content: center;
  border: 1px dashed var(--border);
  border-radius: 10px;
  color: var(--dim);
  font-size: clamp(7px,2vw,9px); letter-spacing: 3px;
  flex-direction: column; gap: 6px;
  touch-action: none;
}
.gesture-zone .gz-arrows {
  font-size: clamp(16px,5vw,24px);
  opacity: 0.25;
  letter-spacing: 4px;
}
.gesture-zone.active-flash {
  border-color: var(--cyan);
  background: rgba(0,245,212,0.04);
}

/* ══ Landscape layout ════════════════════════════ */
@media (orientation: landscape) {
  #app { flex-direction: row; align-items: stretch; padding: 8px 14px 8px; gap: 12px; }

  #canvasWrap { height: 100%; padding: 0; }

  /* Right sidebar */
  #sidebar {
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 4px 0;
    /* width set by JS */
  }

  #headerEl { flex-direction: column; align-items: flex-start; padding-bottom: 0; gap: 4px; width: 100%; }

  #bottomArea { padding-top: 0; }
}

/* ══ Overlays ════════════════════════════════════ */
.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(9px,2.5vw,16px);
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  transition: opacity 0.3s; z-index: 10;
  border-radius: 10px;
  padding: 14px 16px;
  overflow-y: auto;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.ov-title {
  font-size: clamp(16px,5vw,26px); font-weight: 900; letter-spacing: 6px;
  color: var(--cyan); text-shadow: var(--ov-glow); text-align: center;
}
.ov-sub  { font-size: clamp(6px,2vw,9px); letter-spacing: 4px; color: var(--dim); margin-top: -8px; }
.ov-hint { font-size: clamp(6px,2vw,8px); letter-spacing: 2px; color: var(--dim); text-align: center; }
.ov-score {
  font-size: clamp(32px,11vw,52px); font-weight: 700; line-height: 1;
  color: var(--magenta); text-shadow: var(--ov-score-glow);
}

/* profile list */
.profile-list {
  width: 100%; max-height: clamp(120px,32vmin,210px);
  overflow-y: auto; display: flex; flex-direction: column; gap: 5px;
  padding-right: 2px;
}
.profile-list::-webkit-scrollbar { width: 3px; }
.profile-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.profile-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: clamp(8px,2vw,12px) clamp(10px,2.5vw,14px);
  cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
}
.profile-card:active { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,245,212,0.15); background: rgba(0,245,212,0.05); }
.pc-left { display: flex; flex-direction: column; gap: 3px; text-align: left; }
.pc-name { font-size: clamp(10px,3vw,13px); font-weight: 700; letter-spacing: 2px; color: var(--text); }
.pc-meta { font-size: clamp(6px,1.8vw,8px); letter-spacing: 1px; color: var(--dim); }
.pc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.pc-best { font-size: clamp(15px,4.5vw,20px); font-weight: 700; color: var(--cyan); text-shadow: var(--score-glow); }
.pc-best-label { font-size: clamp(5px,1.5vw,7px); letter-spacing: 2px; color: var(--dim); }
.no-profiles { font-size: clamp(8px,2.5vw,10px); letter-spacing: 2px; color: var(--dim); text-align: center; padding: 12px 0; }

.divider {
  width: 100%; height: 1px; background: var(--border);
  position: relative; display: flex; align-items: center; justify-content: center;
}
.divider::before {
  content: 'OR'; font-size: clamp(6px,2vw,7px); letter-spacing: 3px; color: var(--dim);
  background: var(--divider-bg); padding: 0 10px; position: absolute;
}

/* input */
.input-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.input-label { font-size: clamp(6px,2vw,8px); letter-spacing: 3px; color: var(--dim); }
.username-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--cyan); font-family: inherit;
  font-size: clamp(13px,4vw,16px); font-weight: 700; letter-spacing: 4px;
  text-align: center; padding: 8px 0; outline: none;
  width: clamp(150px,55vw,210px);
  text-transform: uppercase; caret-color: var(--cyan);
  -webkit-user-select: auto; user-select: auto;
  transition: border-color 0.2s, text-shadow 0.2s;
}
.username-input::placeholder { color: var(--dim); font-weight: 400; font-size: clamp(9px,3vw,12px); letter-spacing: 2px; }
.username-input:focus { border-bottom-color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
.username-input.err { border-bottom-color: var(--magenta); }

/* buttons */
.btn {
  padding: clamp(8px,2.5vw,12px) clamp(16px,4.5vw,26px);
  font-family: inherit;
  font-size: clamp(9px,2.5vw,11px); font-weight: 700; letter-spacing: 2px;
  border: 1px solid var(--cyan); background: transparent; color: var(--cyan);
  border-radius: 6px; cursor: pointer; transition: all 0.18s;
  text-shadow: var(--btn-glow);
  box-shadow: var(--btn-boxshadow);
  -webkit-tap-highlight-color: transparent;
}
.btn:active { background: rgba(0,245,212,0.12); box-shadow: 0 0 20px rgba(0,245,212,0.2); }
.btn.dim { border-color: var(--border); color: var(--dim); box-shadow: none; text-shadow: none; }
.btn.dim:active { border-color: var(--dim); color: var(--text); background: rgba(255,255,255,0.03); }
.btn-row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: center; }

.record-badge {
  font-size: clamp(7px,2vw,9px); letter-spacing: 3px; color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan); border: 1px solid rgba(0,245,212,0.3);
  padding: 3px 11px; border-radius: 4px; display: none;
}

/* history */
.history-panel { width: 100%; max-width: 200px; display: flex; flex-direction: column; gap: 2px; }
.history-header {
  display: flex; justify-content: space-between;
  font-size: clamp(6px,1.8vw,7px); letter-spacing: 2px; color: var(--dim);
  padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-bottom: 3px;
}
.history-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: clamp(8px,2.2vw,9px); letter-spacing: 1px; color: var(--dim); padding: 2px 0;
}
.history-row.cur  { color: var(--magenta); text-shadow: 0 0 6px var(--magenta); }
.history-row.best { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
.hr-rank{width:26px;} .hr-score{font-weight:700;} .hr-date{font-size:clamp(6px,1.5vw,7px);opacity:0.6;}

/* leaderboard */
.lb-title { font-size: clamp(11px,3.5vw,14px); font-weight: 700; letter-spacing: 4px; color: var(--cyan); text-shadow: 0 0 14px var(--cyan); }
.lb-table { width: 100%; max-width: 240px; display: flex; flex-direction: column; gap: 2px; }
.lb-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: clamp(8px,2.2vw,9px); letter-spacing: 1px; color: var(--dim);
  padding: 4px 0; border-bottom: 1px solid var(--border);
}
.lb-row.header { color: var(--text); font-size: clamp(6px,1.8vw,7px); letter-spacing: 2px; }
.lb-row.gold   { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
.lb-row.silver { color: #c0c0c0; text-shadow: 0 0 6px #c0c0c0; }
.lb-row.bronze { color: #cd7f32; text-shadow: 0 0 6px #cd7f32; }
.lb-row.me     { color: var(--cyan); }
.lb-rank{width:26px;} .lb-name{flex:1;text-align:left;padding:0 6px;}
.lb-score{font-weight:700;min-width:36px;text-align:right;}
.lb-games{font-size:clamp(6px,1.5vw,7px);opacity:0.5;min-width:26px;text-align:right;}
</style>
</head>
<body>

<div id="app">
  <!-- Header (moved to sidebar in landscape via JS) -->
  <div id="headerEl">
    <div class="title-block">
      <div class="title">SERPENT</div>
      <div class="player-tag" id="playerTag">
        <span>▶</span><span class="pname" id="playerName"></span><span class="sw">⇄ 切换</span>
      </div>
    </div>
    <div class="scores">
      <div class="score-box"><div class="score-label">SCORE</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">BEST</div><div class="score-value" id="highscore">0</div></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvasWrap">
    <div class="canvas-container" id="container">
      <canvas id="game"></canvas>
      <div class="pause-badge" id="pauseBadge">⏸ PAUSED</div>

      <!-- Home -->
      <div class="overlay" id="homeOverlay">
        <div class="ov-title">SERPENT</div>
        <div class="ov-sub">NEON EDITION</div>
        <div class="profile-list" id="profileList"><div class="no-profiles">NO PLAYERS YET</div></div>
        <div class="divider"></div>
        <div class="btn-row">
          <button class="btn dim" id="skinsBtn">🎨 SKINS</button>
          <button class="btn dim" id="lbHomeBtn">🏆 RANKS</button>
          <button class="btn" id="newPlayerBtn">+ NEW PLAYER</button>
        </div>
      </div>

      <!-- New player -->
      <div class="overlay hidden" id="newPlayerOverlay">
        <div class="ov-title" style="font-size:clamp(14px,4.5vw,20px);letter-spacing:4px">NEW PLAYER</div>
        <div class="input-group">
          <div class="input-label">CALLSIGN</div>
          <input class="username-input" id="usernameInput" type="text" maxlength="12"
                 autocomplete="off" spellcheck="false" placeholder="YOUR NAME" enterkeyhint="go">
        </div>
        <div class="btn-row">
          <button class="btn dim" id="cancelNewBtn">BACK</button>
          <button class="btn" id="confirmNewBtn">CONFIRM</button>
        </div>
      </div>

      <!-- Game over -->
      <div class="overlay hidden" id="gameOverOverlay">
        <div class="ov-title" style="color:var(--magenta)">TERMINATED</div>
        <div class="ov-score" id="finalScore">0</div>
        <div class="record-badge" id="recordBadge">✦ NEW RECORD ✦</div>
        <div class="unlock-badge hidden" id="unlockBadge"></div>
        <div class="history-panel" id="historyPanel"></div>
        <div class="btn-row">
          <button class="btn dim" id="homeBtn">MENU</button>
          <button class="btn dim" id="lbBtn">RANKS</button>
          <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="overlay hidden" id="lbOverlay">
        <div class="lb-title">RANKINGS</div>
        <div class="lb-table" id="lbTable"></div>
        <button class="btn dim" id="lbCloseBtn">BACK</button>
      </div>

      <!-- Skin selection -->
      <div class="overlay hidden" id="skinOverlay">
        <div class="ov-title">SKINS</div>
        <div class="skin-grid" id="skinGrid"></div>
        <button class="btn dim" id="skinCloseBtn">BACK</button>
      </div>

      <!-- Control mode selection -->
      <div class="overlay hidden" id="ctrlOverlay">
        <div class="ov-title">HOW TO PLAY</div>
        <div class="ctrl-cards">
          <div class="ctrl-card" id="cardDpad">
            <div class="ctrl-card-icon">🕹️</div>
            <div class="ctrl-card-name">D-PAD</div>
            <div class="ctrl-card-desc">TAP DIRECTION<br>BUTTONS</div>
          </div>
          <div class="ctrl-card" id="cardSwipe">
            <div class="ctrl-card-icon">👆</div>
            <div class="ctrl-card-name">SWIPE</div>
            <div class="ctrl-card-desc">SWIPE ANYWHERE<br>ON SCREEN</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sidebar (landscape) / Bottom area (portrait) -->
  <div id="sidebar">

let facePeople=[];      // [{name, img: HTMLImageElement}]
let faceHeadIdx=0;      // index of current snake head person
let faceFoodIdx=1;      // index of current food person

function makeFaceImg(src){
  return new Promise(res=>{
    const img=new Image(); img.onload=()=>res(img); img.onerror=()=>res(null); img.src=src;
  });
}
function loadPeopleFromPlugin(){
  // Clear stale cache so we always get fresh processed images
  localStorage.removeItem('serpent_face_cache');
  // Set up one-time callback for native response
  window.__receivePeople=async function(raw){
    if(!raw||!raw.length){ facePeople=[]; return; }
    const imgs=await Promise.all(raw.map(p=>makeFaceImg(p.image).then(img=>({name:p.name,img}))));
    facePeople=imgs.filter(p=>p.img);
    faceHeadIdx=0;
    faceFoodIdx=Math.min(1,facePeople.length-1);
    try{ localStorage.setItem('serpent_face_cache',JSON.stringify(raw.map(p=>({name:p.name,image:p.image})))); }catch(e){}
    if(gameState==='skins') renderSkinGrid();
  };
  // Call native via WKScriptMessageHandler
  window.webkit?.messageHandlers?.fetchPeople?.postMessage({});
}
async function loadPeopleFromCache(){
  try{
    const cached=JSON.parse(localStorage.getItem('serpent_face_cache')||'[]');
    if(!cached.length) return;
    const imgs=await Promise.all(cached.map(p=>makeFaceImg(p.image).then(img=>({name:p.name,img}))));
    facePeople=imgs.filter(p=>p.img);
    faceHeadIdx=0; faceFoodIdx=Math.min(1,facePeople.length-1);
  }catch(e){}
}
// Load cached people on boot, then refresh from plugin if face skin active
loadPeopleFromCache().then(()=>{ if(activeSkinId==='face') loadPeopleFromPlugin(); });

  r.style.setProperty('--grad2',t.grad2);
  r.style.setProperty('--title-shadow',t.titleShadow||`0 0 16px ${t.primary}, 0 0 36px rgba(0,245,212,0.2)`);
  r.style.setProperty('--ov-glow',t.ovGlow||`0 0 20px ${t.primary}`);
  r.style.setProperty('--score-glow',t.scoreGlow||`0 0 10px ${t.primary}`);
  r.style.setProperty('--ov-score-glow',t.ovScoreGlow||`0 0 24px ${t.accent}, 0 0 60px rgba(255,0,110,0.3)`);
  r.style.setProperty('--btn-glow',t.btnGlow||`0 0 10px ${t.primary}`);
  r.style.setProperty('--btn-boxshadow',t.btnBoxShadow||'0 0 14px rgba(0,245,212,0.08), inset 0 0 14px rgba(0,245,212,0.04)');
  r.style.setProperty('--canvas-boxshadow',t.canvasBoxShadow||'0 0 0 1px #0d0d2a, 0 0 28px rgba(0,245,212,0.08), inset 0 0 28px rgba(0,0,0,0.6)');
  r.style.setProperty('--overlay-bg',t.overlayBg||'rgba(5,5,16,0.92)');
  r.style.setProperty('--divider-bg',t.dividerBg||'rgba(5,5,16,0.92)');

  document.body.dataset.skin=sk.id;
  let s=document.getElementById('skin-css');

}

function drawSkinThumb(canvas, sk){
  const w=canvas.width, h=canvas.height;
  const ctx=canvas.getContext('2d');
  const r=w*0.10;
  const px=sk.style==='pixel';
  const outline=sk.style==='outline';
  ctx.fillStyle=sk.bg; ctx.fillRect(0,0,w,h);
  function drawSeg(x,y,rad,color){
    ctx.beginPath();
    if(px) ctx.rect(x-rad,y-rad,rad*2,rad*2);
    else   ctx.arc(x,y,rad,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    if(outline){ctx.strokeStyle=sk.outlineColor||'#1a1a1a';ctx.lineWidth=1.5;ctx.stroke();}
  }
  const cy=h*0.50;
  // Face skin: show face image as head & food if available
  if(sk.id==='face'){
    // body segments only
    drawSeg(w*0.18,cy,r,sk.body(1.0));
    drawSeg(w*0.34,cy,r,sk.body(0.66));
    drawSeg(w*0.50,cy,r,sk.body(0.33));
    const drawThumbFace=(cx2,cy2,rad)=>{
      const img=facePeople[faceHeadIdx]?.img;
      ctx.save(); ctx.beginPath(); ctx.arc(cx2,cy2,rad,0,Math.PI*2); ctx.clip();
      if(img&&img.complete&&img.naturalWidth>0){
        ctx.drawImage(img,cx2-rad,cy2-rad,rad*2,rad*2);
      } else {
        ctx.fillStyle='#4a1a80'; ctx.fill();
        ctx.font=`${rad*1.1}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('📸',cx2,cy2);
      }
      ctx.restore();
      ctx.beginPath(); ctx.arc(cx2,cy2,rad,0,Math.PI*2);
      ctx.strokeStyle='rgba(204,68,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
    };
    drawThumbFace(w*0.66,cy,r*1.2);
    drawThumbFace(w*0.86,cy,r*0.80);
    return;
  }
  // 3 body segments (tail on left)
  drawSeg(w*0.18, cy, r, sk.body(1.0));
  drawSeg(w*0.34, cy, r, sk.body(0.66));
  drawSeg(w*0.50, cy, r, sk.body(0.33));
  // Head
  drawSeg(w*0.66, cy, r*1.2, sk.head[0]);
  // Eye
  ctx.beginPath(); ctx.arc(w*0.66+r*0.55, cy-r*0.45, r*0.30,0,Math.PI*2);
  ctx.fillStyle='#050510'; ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.66+r*0.60, cy-r*0.50, r*0.12,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  // Food dot
  drawSeg(w*0.86, cy, r*0.80, sk.food[1]);
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const loadAll = ()=>{ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch{ return {}; } };
const saveAll = d => localStorage.setItem(LS_KEY, JSON.stringify(d));
const getUser = n => loadAll()[n]||{best:0,games:[]};
const fmtDate = d => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
function recordGame(name,sc){
  const all=loadAll(), u=all[name]||{best:0,games:[]};
  u.best=Math.max(u.best,sc);
  u.games.unshift({score:sc,date:fmtDate(new Date())});
  if(u.games.length>MAX_HIST)u.games=u.games.slice(0,MAX_HIST);
  all[name]=u; saveAll(all); return u;
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function isLandscape(){ return window.innerWidth > window.innerHeight; }

function resize(){
  activeGrid = activeSkin?.id==='face' ? GRID_FACE : GRID;
  const vw=window.innerWidth, vh=window.innerHeight;
  const land=isLandscape();

  if(land){
    // sidebar on right
    appEl.style.cssText='flex-direction:row;align-items:stretch;padding:8px 14px 8px;gap:12px;';
    sidebar.style.cssText=`flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4px 0;`;
    canvasWrap.style.cssText='flex:1;min-width:0;display:flex;align-items:center;justify-content:center;height:100%;';
    headerEl.style.cssText='flex-direction:column;align-items:flex-start;padding-bottom:0;gap:4px;width:100%;display:flex;';
    bottomArea.style.cssText='display:flex;flex-direction:column;align-items:center;gap:8px;';

    // Move header into sidebar top
    if(sidebar.firstChild!==headerEl) sidebar.prepend(headerEl);

    // Compute board size: height fills screen minus padding
    const padV=16, padH=28+12; // top+bottom, left+right+gap
    const sideW=Math.min(180,vw*0.3);
    sidebar.style.width=sideW+'px';
    const dpadSz=Math.min(sideW-8, 168);
    dpadEl.style.width=dpadSz+'px'; dpadEl.style.height=dpadSz+'px';
    const gz=document.getElementById('gestureZone');
    gz.style.width=dpadSz+'px'; gz.style.height=dpadSz+'px';

    const maxBoard=Math.min(vw-sideW-padH, vh-padV, 480);
    cellSize=Math.max(10,Math.floor(maxBoard/activeGrid));

  } else {
    // portrait stacked
    appEl.style.cssText='flex-direction:column;align-items:center;padding:10px 12px 6px;gap:0;';
    sidebar.style.cssText='flex-shrink:0;width:100%;display:flex;flex-direction:column;align-items:center;';
    canvasWrap.style.cssText='flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;';
    headerEl.style.cssText='flex-direction:row;width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:8px;flex-shrink:0;';
    bottomArea.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:6px;width:100%;';

    // Move header back to top of app
    if(appEl.firstChild!==headerEl) appEl.prepend(headerEl);

    // D-pad: 42% of screen width, capped
    const dpadSz=Math.min(vw*0.42, 180, vh*0.28);
    dpadEl.style.width=dpadSz+'px'; dpadEl.style.height=dpadSz+'px';

    // Canvas: remaining vertical space (always reserves dpad-sized space)
    const hdrH = headerEl.offsetHeight || 52;
    const pipsH = 22, gaps = 6+8+6+10;
    const avH = vh - hdrH - dpadSz - pipsH - gaps;
    const avW = vw - 24;
    const maxBoard = Math.min(avH, avW, 480);
    cellSize=Math.max(10,Math.floor(maxBoard/activeGrid));

    // Gesture zone: fill ALL bottom space below the canvas
    // Use appEl.clientHeight (safe-area-aware) to avoid overflowing into header
    const gz=document.getElementById('gestureZone');
    const actualBoard=cellSize*activeGrid;
    const usableH=appEl.clientHeight; // excludes iOS safe-area insets
    // 50 = appPaddingTop(10) + appPaddingBottom(6) + bottomAreaPaddingTop(6) + speedRow(22) + gap(6)
    const gzH=Math.max(dpadSz, usableH-50-hdrH-actualBoard);
    gz.style.width=(vw-24)+'px'; gz.style.height=gzH+'px';
  }

  boardSize=cellSize*activeGrid;
  canvas.width=boardSize; canvas.height=boardSize;
  container.style.width=boardSize+'px'; container.style.height=boardSize+'px';
  // Safety: canvasWrap must always fit the canvas so it never overflows into the header
  canvasWrap.style.minHeight=boardSize+'px';
}

// ─── Game ─────────────────────────────────────────────────────────────────────
function startGame(){
  resize(); initGame(); hideAll();
  gameState='playing'; lastStep=0;
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(gameLoop);
}

function initGame(){
  const mid=Math.floor(activeGrid/2);
  snake=[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  dir={x:1,y:0}; dirQueue=[];
  score=0; particles=[]; floatTexts=[]; deathFlash=0;
  faceHeadIdx=0;
  faceFoodIdx=facePeople.length>1?1:0;
  placeFood(); updateScoreEl(); updatePips();
}

function placeFood(){
  let p; do{p={x:Math.floor(Math.random()*activeGrid),y:Math.floor(Math.random()*activeGrid)};}
  while(snake.some(s=>s.x===p.x&&s.y===p.y)); food=p;
}

function updateScoreEl(){
  const el=document.getElementById('score');
  el.textContent=score; el.classList.remove('pop'); void el.offsetWidth;
  el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),160);
  document.getElementById('highscore').textContent=highScore;
}

function updatePips(){
  const f=Math.min(PIPS,Math.floor(score/10/2)+1),hot=f>=PIPS;
  for(let i=0;i<PIPS;i++){
    document.getElementById('pip'+i).classList.toggle('active',i<f&&!hot);
    document.getElementById('pip'+i).classList.toggle('hot',i<f&&hot);
  }
}

function getSpeed(){ return Math.max(MIN_SPEED,BASE_SPEED-(score/10)*SPEED_STEP); }

function step(){
  if(dirQueue.length>0) dir=dirQueue.shift();
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=activeGrid||h.y<0||h.y>=activeGrid||snake.some(s=>s.x===h.x&&s.y===h.y)){endGame();return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    score+=10; highScore=Math.max(score,highScore);
    updateScoreEl(); updatePips();
    spawnParticles(food.x,food.y); spawnFloat(food.x,food.y,'+10');
    if(activeSkin.foodShape==='face') advanceFacePerson();
    placeFood();
  } else { snake.pop(); }
  // 队列里还有待执行的方向，下一帧立即触发下一步
  if(dirQueue.length>0) lastStep=performance.now()-getSpeed();
}

function endGame(){
  gameState='over'; deathFlash=1; cancelAnimationFrame(animId);
  const prevBest=getGlobalBest();
  const u=recordGame(currentUser,score);
  highScore=u.best; document.getElementById('highscore').textContent=highScore;
  document.getElementById('finalScore').textContent=score;
  const isRec=score>0&&score===u.best&&u.games.filter(g=>g.score===score).length===1;
  document.getElementById('recordBadge').style.display=isRec?'block':'none';
  const newBest=getGlobalBest();
  const newUnlocks=SKIN_DEFS.filter(s=>s.unlock>0&&s.unlock<=newBest&&s.unlock>prevBest);
  const ub=document.getElementById('unlockBadge');
  if(newUnlocks.length){ub.textContent='🎨 UNLOCKED: '+newUnlocks.map(s=>s.name).join(' & ');ub.classList.remove('hidden');}
  else{ub.classList.add('hidden');}
  renderHistory(u);
  setTimeout(()=>showOnly('gameOverOverlay'),380);
  requestAnimationFrame(drainLoop);
}

function togglePause(){
  if(gameState==='playing'){
    gameState='paused'; cancelAnimationFrame(animId);
    document.getElementById('pauseBadge').classList.add('on');
  } else if(gameState==='paused'){
    gameState='playing';
    document.getElementById('pauseBadge').classList.remove('on');
    lastStep=performance.now(); animId=requestAnimationFrame(gameLoop);
  }
}

// ─── History / LB ─────────────────────────────────────────────────────────────
function renderHistory(u){
  const p=document.getElementById('historyPanel');
  if(!u.games.length){p.innerHTML='';return;}
  const latest=u.games[0]; // most recent before sort
  const sorted=[...u.games].sort((a,b)=>b.score-a.score);
  let h=`<div class="history-header"><span>RANK</span><span>SCORE</span><span>DATE</span></div>`;
  sorted.forEach((g,i)=>{
    const isLatest=g===latest, isBest=i===0&&!isLatest;
    const cls=isLatest?'cur':(isBest?'best':'');
    const tag=isLatest?' ◀':(isBest?' ★':'');
    h+=`<div class="history-row ${cls}"><span class="hr-rank">#${String(i+1).padStart(2,'0')}</span><span class="hr-score">${g.score}${tag}</span><span class="hr-date">${g.date}</span></div>`;
  });
  p.innerHTML=h;
}

function renderLeaderboard(){
  const all=loadAll(),rows=Object.entries(all).map(([n,d])=>({name:n,best:d.best,games:d.games.length})).sort((a,b)=>b.best-a.best).slice(0,10);
  const table=document.getElementById('lbTable');
  if(!rows.length){table.innerHTML='<div class="lb-row" style="justify-content:center">—</div>';return;}
  const mc=['gold','silver','bronze'];

  rows.forEach((r,i)=>{
    const isMe=r.name===currentUser;
    const cls=[mc[i]||'', isMe?'me':''].filter(Boolean).join(' ');
    const num=['🥇','🥈','🥉'][i]||(i+1);
    h+=`<div class="lb-row ${cls}"><span class="lb-rank">${num}</span><span class="lb-name">${r.name}${isMe?' ◀':''}</span><span class="lb-score">${r.best}</span><span class="lb-games">${r.games}</span></div>`;
  });
  table.innerHTML=h;
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(gx,gy){
  const cx=gx*cellSize+cellSize/2,cy=gy*cellSize+cellSize/2;
  for(let i=0;i<16;i++){
    const a=(Math.PI*2/16)*i+Math.random()*0.4,sp=1.5+Math.random()*3;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.028+Math.random()*0.02,size:1.5+Math.random()*2.5,hue:Math.random()>0.45?330:175});
  }
}
function spawnFloat(gx,gy,text){ floatTexts.push({x:gx*cellSize+cellSize/2,y:gy*cellSize,text,life:1,vy:-1.6}); }
function updateParticles(){
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life-=p.decay;return p.life>0;});
  floatTexts=floatTexts.filter(f=>{f.y+=f.vy;f.life-=0.025;return f.life>0;});
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawGrid(){
  const sk=activeSkin;
  ctx.strokeStyle=sk.grid; ctx.lineWidth=sk.style==='pixel'?1:0.5;
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*cellSize,0);ctx.lineTo(i*cellSize,boardSize);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cellSize);ctx.lineTo(boardSize,i*cellSize);ctx.stroke();
  }
}
function draw(ts){
  const sk=activeSkin; foodPulse=ts*0.003;
  ctx.fillStyle=sk.bg; ctx.fillRect(0,0,boardSize,boardSize);
  if(deathFlash>0){ctx.fillStyle=`rgba(255,0,80,${deathFlash*0.25})`;ctx.fillRect(0,0,boardSize,boardSize);deathFlash-=0.06;}
  drawGrid();
  if(food)drawFood();
  if(snake&&snake.length)drawSnake();
  drawParticles();
}

function drawFood(){
  const sk=activeSkin;
  const cx=food.x*cellSize+cellSize/2,cy=food.y*cellSize+cellSize/2;
  if(sk.foodShape==='star'){drawFoodStar(cx,cy,sk);return;}
  if(sk.foodShape==='coin'){drawFoodCoin(cx,cy,sk);return;}
  if(sk.foodShape==='spirit'){drawFoodSpirit(cx,cy,sk);return;}
  if(sk.foodShape==='soot'){drawFoodSoot(cx,cy,sk);return;}
  if(sk.foodShape==='face'){drawFoodFace(cx,cy);return;}
  // orb (default)
  const r=cellSize*0.36*(Math.sin(foodPulse)*0.15+0.87);
  ctx.save(); ctx.shadowColor=sk.foodGlow; ctx.shadowBlur=sk.style==='outline'?0:20;
  const g=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,0,cx,cy,r);
  g.addColorStop(0,sk.food[0]);g.addColorStop(0.5,sk.food[1]);g.addColorStop(1,sk.food[2]);
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  if(sk.style==='outline'){ctx.strokeStyle=sk.outlineColor||'#1a1a1a';ctx.lineWidth=2;ctx.stroke();}
  ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(cx-r*0.3,cy-r*0.32,r*0.22,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawFoodStar(cx,cy,sk){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(foodPulse*0.4);
  const sc=1+Math.sin(foodPulse*1.2)*0.1, r=cellSize*0.38;
  ctx.scale(sc,sc); ctx.shadowColor=sk.foodGlow; ctx.shadowBlur=18;
  ctx.fillStyle=sk.food[1]; ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=(i*Math.PI/5)-Math.PI/2, rad=i%2===0?r:r*0.42;
    i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,220,0.8)'; ctx.beginPath(); ctx.arc(-r*0.2,-r*0.2,r*0.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawFoodCoin(cx,cy,sk){
  const sz=cellSize*0.68, h=sz/2; ctx.save(); ctx.shadowColor=sk.foodGlow; ctx.shadowBlur=8;
  ctx.fillStyle=sk.food[2]; ctx.fillRect(cx-h+2,cy-h+2,sz,sz);
  ctx.fillStyle=sk.food[1]; ctx.fillRect(cx-h,cy-h,sz,sz);
  ctx.fillStyle=sk.food[0]; ctx.fillRect(cx-h+2,cy-h+2,sz*0.4,sz*0.35);
  ctx.restore();
}
function drawFoodSpirit(cx,cy,sk){
  ctx.save(); const pulse=Math.sin(foodPulse*0.8)*0.1+0.9, r=cellSize*0.36*pulse;
  ctx.shadowColor=sk.foodGlow; ctx.shadowBlur=24;
  const g1=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.9);
  g1.addColorStop(0,'rgba(180,255,140,0.22)'); g1.addColorStop(1,'rgba(180,255,140,0)');
  ctx.fillStyle=g1; ctx.beginPath(); ctx.arc(cx,cy,r*1.9,0,Math.PI*2); ctx.fill();
  const g2=ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,0,cx,cy,r);
  g2.addColorStop(0,sk.food[0]); g2.addColorStop(0.55,sk.food[1]); g2.addColorStop(1,sk.food[2]);
  ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(cx-r*0.28,cy-r*0.28,r*0.2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFaceCircle(cx,cy,r,personIdx){
  const person=facePeople[personIdx];
  ctx.save();
  ctx.shadowColor='#cc44ff'; ctx.shadowBlur=22;
  if(person?.img){

function advanceFacePerson(){

function drawFoodSoot(cx,cy){

  const spikes=7;

    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(cx+ex+er*0.18,cy+ey+er*0.1,er*0.52,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(cx+ex-er*0.1,cy+ey-er*0.32,er*0.25,0,Math.PI*2); ctx.fill();
  });

}
function drawUnicornHead(seg){

    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(mx,my,r*0.35,0,Math.PI*2); ctx.fill();
  });
  [['#FF88DD',-r*0.08,-r*0.74],['#BB66FF',r*0.12,-r*0.80]].forEach(([c,mx,my])=>{
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(mx,my,r*0.27,0,Math.PI*2); ctx.fill();

  // Rainbow horn (from forehead, angled forward-upward)

  ctx.fillStyle='#2B1E88'; ctx.beginPath(); ctx.arc(r*0.16,-r*0.18,er*0.66,0,Math.PI*2); ctx.fill();

  // Pink blush under eye

}
function drawCatbusHead(seg){
  // Side-profile catbus with animated chomping mouth
  const cx=seg.x*cellSize+cellSize/2, cy=seg.y*cellSize+cellSize/2;

  const fa=Math.atan2(dir.y,dir.x);
  const bite=Math.abs(Math.sin(foodPulse*3))*r*0.32+r*0.18; // min 0.18r so teeth always visible

  // Ear (visible from side — on top of head)
  ctx.fillStyle='#C8A060';
  ctx.beginPath(); ctx.moveTo(r*0.02,-r*0.76); ctx.lineTo(r*0.3,-r*1.26); ctx.lineTo(r*0.58,-r*0.76); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(210,130,130,0.55)';
  ctx.beginPath(); ctx.moveTo(r*0.12,-r*0.76); ctx.lineTo(r*0.3,-r*1.06); ctx.lineTo(r*0.48,-r*0.76); ctx.closePath(); ctx.fill();
  // Body circle
  ctx.fillStyle='#D4B07A';

  // Lower jaw (opens downward)

  // Dark mouth interior
  ctx.fillStyle='#2A1005';

  // Teeth — always visible (catbus iconic grin)
  ctx.fillStyle='#FEFDE8';

  ctx.fillStyle='#1a1210'; ctx.beginPath(); ctx.arc(r*0.2,-r*0.2,er*0.52,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(r*0.1,-r*0.34,er*0.28,0,Math.PI*2); ctx.fill();
  // Whiskers (extending backward)
  ctx.strokeStyle='rgba(60,40,10,0.5)'; ctx.lineWidth=Math.max(0.5,r*0.06); ctx.lineCap='round';

    ctx.beginPath(); ctx.moveTo(r*0.18,sy); ctx.lineTo(-r*0.92,sy); ctx.stroke();

function drawSnake(){
  const sk=activeSkin;
  if(sk.style==='pixel'){drawSnakePixel(sk);return;}
  if(sk.style==='outline'){drawSnakeOutline(sk);return;}
  drawSnakeSmooth(sk);
}
function drawSnakeSmooth(sk){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=Math.max(3,cellSize-4);
  const len=snake.length;
  for(let i=len-1;i>0;i--){
    const t=i/(len-1||1),seg=snake[i],prev=snake[i-1],color=sk.body(t);
    ctx.strokeStyle=color; ctx.shadowColor=sk.bodyGlow(t); ctx.shadowBlur=8+(1-t)*8;
    ctx.beginPath();
    ctx.moveTo(prev.x*cellSize+cellSize/2,prev.y*cellSize+cellSize/2);
    ctx.lineTo(seg.x*cellSize+cellSize/2,seg.y*cellSize+cellSize/2);
    ctx.stroke();
  }
  if(sk.headStyle==='unicorn'){ctx.restore();drawUnicornHead(snake[0]);return;}
  if(sk.headStyle==='catbus'){ctx.restore();drawCatbusHead(snake[0]);return;}
  if(sk.headStyle==='face'){ctx.restore();drawFaceHead(snake[0]);return;}
  const hx=snake[0].x*cellSize+cellSize/2, hy=snake[0].y*cellSize+cellSize/2, hr=Math.max(3,cellSize/2-2);
  ctx.shadowColor=sk.headGlow; ctx.shadowBlur=24;
  const hg=ctx.createRadialGradient(hx-hr*0.3,hy-hr*0.3,0,hx,hy,hr);
  hg.addColorStop(0,sk.head[0]); hg.addColorStop(0.6,sk.head[1]); hg.addColorStop(1,sk.head[2]);
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#040414';
  const ea=Math.atan2(dir.y,dir.x),perp=ea+Math.PI/2,er=Math.max(1.5,hr*0.16),efwd=hr*0.35,eside=hr*0.38;
  [[1],[-1]].forEach(([s])=>{
    const ex=hx+Math.cos(ea)*efwd+Math.cos(perp)*eside*s, ey=hy+Math.sin(ea)*efwd+Math.sin(perp)*eside*s;
    ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath();ctx.arc(ex-er*0.3,ey-er*0.3,er*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#040414';
  });
  ctx.restore();
}
function drawSnakePixel(sk){
  const p=Math.max(1,Math.floor(cellSize*0.1)), sz=cellSize-p*2;
  ctx.save();
  const len=snake.length;
  for(let i=len-1;i>=0;i--){
    if(i===0 && sk.headStyle==='pacman') continue; // head drawn separately as Pac-Man
    const t=i/(len-1||1), seg=snake[i];
    ctx.shadowColor=sk.bodyGlow(t); ctx.shadowBlur=i===0?10:4;
    ctx.fillStyle=i===0?sk.head[1]:sk.body(t);
    ctx.fillRect(seg.x*cellSize+p,seg.y*cellSize+p,sz,sz);
  }
  if(sk.headStyle==='pacman'){
    ctx.restore();
    drawPacManHead(snake[0]);
    return;
  }
  const h=snake[0]; ctx.shadowBlur=0; ctx.fillStyle=sk.head[0];
  ctx.fillRect(h.x*cellSize+p,h.y*cellSize+p,Math.floor(sz*0.38),Math.floor(sz*0.38));
  const eyeSz=Math.max(2,Math.floor(sz/5));
  const hcx=h.x*cellSize+cellSize/2, hcy=h.y*cellSize+cellSize/2;
  const ea=Math.atan2(dir.y,dir.x), perp=ea+Math.PI/2;
  [[1],[-1]].forEach(([s])=>{
    const ex=Math.round(hcx+Math.cos(ea)*sz*0.28+Math.cos(perp)*sz*0.22*s);
    const ey=Math.round(hcy+Math.sin(ea)*sz*0.28+Math.sin(perp)*sz*0.22*s);
    ctx.fillStyle='#000000'; ctx.fillRect(ex-Math.floor(eyeSz/2),ey-Math.floor(eyeSz/2),eyeSz,eyeSz);
  });
  ctx.restore();
}
function drawPacManHead(seg){
  const cx=seg.x*cellSize+cellSize/2, cy=seg.y*cellSize+cellSize/2;
  const r=cellSize/2-1;
  const mouthAngle=Math.abs(Math.sin(foodPulse*3))*0.35+0.05;
  const facing=Math.atan2(dir.y,dir.x);
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(facing);
  ctx.shadowColor='#ffee00'; ctx.shadowBlur=12;
  ctx.fillStyle='#ffee00';
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.arc(0,0,r,mouthAngle,Math.PI*2-mouthAngle);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#111'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(-r*0.1,-r*0.5,r*0.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawSnakeOutline(sk){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const lw=Math.max(3,cellSize-4), oc=sk.outlineColor||'#1a1a1a', len=snake.length;
  ctx.strokeStyle=oc; ctx.shadowBlur=0; ctx.lineWidth=lw+4;
  for(let i=len-1;i>0;i--){
    const seg=snake[i],prev=snake[i-1];
    ctx.beginPath(); ctx.moveTo(prev.x*cellSize+cellSize/2,prev.y*cellSize+cellSize/2);
    ctx.lineTo(seg.x*cellSize+cellSize/2,seg.y*cellSize+cellSize/2); ctx.stroke();
  }
  ctx.strokeStyle=sk.body(0); ctx.lineWidth=lw;
  for(let i=len-1;i>0;i--){
    const seg=snake[i],prev=snake[i-1];
    ctx.beginPath(); ctx.moveTo(prev.x*cellSize+cellSize/2,prev.y*cellSize+cellSize/2);
    ctx.lineTo(seg.x*cellSize+cellSize/2,seg.y*cellSize+cellSize/2); ctx.stroke();
  }
  const hx=snake[0].x*cellSize+cellSize/2, hy=snake[0].y*cellSize+cellSize/2, hr=Math.max(3,cellSize/2-2);
  ctx.fillStyle=sk.head[0]; ctx.strokeStyle=oc; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill(); ctx.stroke();
  const ea=Math.atan2(dir.y,dir.x),perp=ea+Math.PI/2,er=Math.max(2,hr*0.22),efwd=hr*0.32,eside=hr*0.40;
  [[1],[-1]].forEach(([s])=>{
    const ex=hx+Math.cos(ea)*efwd+Math.cos(perp)*eside*s, ey=hy+Math.sin(ea)*efwd+Math.sin(perp)*eside*s;
    ctx.fillStyle=oc; ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex+er*0.25,ey-er*0.25,er*0.38,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life*p.life;
    ctx.fillStyle=`hsl(${p.hue},100%,65%)`;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  floatTexts.forEach(f=>{
    ctx.save();ctx.globalAlpha=f.life;
    ctx.font=`bold ${Math.max(8,Math.floor(cellSize*0.6))}px Orbitron,monospace`;
    ctx.fillStyle='#ff006e';ctx.shadowColor='#ff006e';ctx.shadowBlur=10;
    ctx.textAlign='center';ctx.fillText(f.text,f.x,f.y);ctx.restore();

// ─── Loops ────────────────────────────────────────────────────────────────────
function gameLoop(ts){
  if(gameState!=='playing')return;
  updateParticles();draw(ts);
  if(ts-lastStep>=getSpeed()){step();lastStep=ts;}
  animId=requestAnimationFrame(gameLoop);
}
function drainLoop(ts){
  draw(ts);updateParticles();
  if(particles.length||floatTexts.length)requestAnimationFrame(drainLoop);
}

// ─── Controls ─────────────────────────────────────────────────────────────────
const KEYS={'ArrowUp':{x:0,y:-1},'w':{x:0,y:-1},'W':{x:0,y:-1},'ArrowDown':{x:0,y:1},'s':{x:0,y:1},'S':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'a':{x:-1,y:0},'A':{x:-1,y:0},'ArrowRight':{x:1,y:0},'d':{x:1,y:0},'D':{x:1,y:0}};
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();if(gameState==='over'){startGame();return;}if(gameState==='playing'||gameState==='paused')togglePause();return;}
  if(e.key==='Enter'){if(gameState==='new'){confirmNewPlayer();return;}if(gameState==='over'){startGame();return;}}
  if(gameState==='new'||gameState==='home')return;
  const d=KEYS[e.key];if(!d)return;e.preventDefault();
  if(gameState!=='playing')return;
  queueDir(d.x,d.y);
});

function nudgeStep(){
  const now=performance.now();
  if(now-lastStep>30) lastStep=now-getSpeed();
}

// 新输入与队列末尾比较，最多缓存2步，支持U形转弯
function queueDir(dx,dy){
  if(gameState!=='playing')return;
  const last=dirQueue.length>0?dirQueue[dirQueue.length-1]:dir;
  if(dx===-last.x&&dy===-last.y)return; // 与即将执行的方向相反，丢弃
  if(dx===last.x&&dy===last.y)return;   // 重复方向，丢弃
  if(dirQueue.length<2)dirQueue.push({x:dx,y:dy});
  nudgeStep();
}

function applyDir(dx,dy){queueDir(dx,dy);}
document.getElementById('dUp').addEventListener('click',()=>applyDir(0,-1));
document.getElementById('dDown').addEventListener('click',()=>applyDir(0,1));
document.getElementById('dLeft').addEventListener('click',()=>applyDir(-1,0));
document.getElementById('dRight').addEventListener('click',()=>applyDir(1,0));
document.getElementById('dPause').addEventListener('click',()=>{if(gameState==='playing'||gameState==='paused')togglePause();});

// ─── Touch swipe（全屏手势操控）─────────────────────────────────────────────
let lastTouch=null, swipeStart=null, swipeMoved=false;

document.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  lastTouch=swipeStart={x:t.clientX,y:t.clientY};
  swipeMoved=false;
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(!lastTouch)return;
  // D-pad 模式下只有 canvas 区域触发手势
  if(controlMode==='dpad' && !e.target.closest('#game'))return;
  e.preventDefault();
  const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
  const dx=cx-lastTouch.x,dy=cy-lastTouch.y;
  const threshold=10;
  if(Math.abs(dx)>Math.abs(dy)){
    if(Math.abs(dx)>threshold){applyDir(dx>0?1:-1,0);lastTouch={x:cx,y:cy};swipeMoved=true;}
  } else {
    if(Math.abs(dy)>threshold){applyDir(0,dy>0?1:-1);lastTouch={x:cx,y:cy};swipeMoved=true;}
  }
},{passive:false});

document.addEventListener('touchend',e=>{
  // 快速滑动时 touchmove 可能未触发，在 touchend 兜底检测
  if(!swipeMoved && swipeStart && e.changedTouches[0]){
    const isCanvas=controlMode!=='dpad'||e.target.closest('#game');
    if(isCanvas){
      const cx=e.changedTouches[0].clientX,cy=e.changedTouches[0].clientY;
      const dx=cx-swipeStart.x,dy=cy-swipeStart.y;
      if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>14)applyDir(dx>0?1:-1,0);}
      else{if(Math.abs(dy)>14)applyDir(0,dy>0?1:-1);}
    }
  }
  lastTouch=swipeStart=null; swipeMoved=false;
},{passive:true});

document.getElementById('homeBtn').addEventListener('click',showHome);
document.getElementById('playerTag').addEventListener('click',showHome);
document.getElementById('lbBtn').addEventListener('click',()=>{renderLeaderboard();document.getElementById('gameOverOverlay').classList.add('hidden');showOnly('lbOverlay');});
document.getElementById('lbHomeBtn').addEventListener('click',()=>{renderLeaderboard();showOnly('lbOverlay');});
document.getElementById('lbCloseBtn').addEventListener('click',()=>{ if(gameState==='over') showOnly('gameOverOverlay'); else showHome(); });
document.getElementById('usernameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmNewPlayer();document.getElementById('usernameInput').classList.remove('err');});

window.addEventListener('resize',()=>{resize();if(gameState==='home'||gameState==='new')drawStaticBg();});

// ─── Boot ─────────────────────────────────────────────────────────────────────
resize();
applySkinTheme(activeSkin);
setControlMode(controlMode);
drawStaticBg();
showHome();
</script>
</body>
</html>
